{{- if .Values.backup.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "business.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.backup.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.backup.storage.size }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "business.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: pgdump
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: PGHOST
                  value: postgres
                - name: PGPORT
                  value: {{ .Values.postgres.port | quote }}
                - name: PGDATABASE
                  value: {{ .Values.postgres.database | quote }}
                - name: PGUSER
                  valueFrom: { secretKeyRef: { name: db-secret, key: POSTGRES_USER } }
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: db-secret, key: POSTGRES_PASSWORD } }
                - name: RETENTION
                  value: {{ .Values.backup.retention | quote }}
              command: [/bin/sh, -c]
              args:
                - |
                  set -euo pipefail
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  OUT=/backup/pgdump-${TS}.sql.gz
                  echo "Dumping ${PGDATABASE} → ${OUT}"
                  pg_dump --no-owner --no-privileges --clean --if-exists "${PGDATABASE}" \
                    | gzip -9 > "${OUT}"
                  echo "Pruning old dumps (retain last ${RETENTION})"
                  ls -1t /backup/pgdump-*.sql.gz \
                    | tail -n +$((RETENTION + 1)) \
                    | xargs -r rm -v
                  echo "Backup complete:"
                  ls -lh /backup/pgdump-*.sql.gz
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits:   { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: postgres-backup
            - name: tmp
              emptyDir: {}
{{- end }}
