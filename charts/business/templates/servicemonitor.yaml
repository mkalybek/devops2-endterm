{{- if .Values.fastapi.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fastapi
  namespace: {{ .Values.namespace }}
  labels:
    release: monitoring
    {{- include "business.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: fastapi
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.fastapi.serviceMonitor.interval }}
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
{{- end }}
