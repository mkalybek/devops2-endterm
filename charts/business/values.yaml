# Chart-wide values for the business app (FastAPI + Postgres).
# Bumping fastapi.image.tag here triggers a zero-downtime rolling update:
# commit, push, ArgoCD reconciles, RollingUpdate maxUnavailable=0 + readiness
# probe ensure 100% requests get a 200 throughout the rollout.

namespace: business

fastapi:
  image:
    repository: business-fastapi
    tag: "2.0.2"
    pullPolicy: Never  # built directly into containerd via nerdctl on the VM
  replicas: 5
  port: 8000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  pdb:
    minAvailable: 1

  serviceMonitor:
    enabled: true
    interval: 15s

  ingress:
    enabled: true
    className: nginx
    host: business.local
    tls:
      enabled: true
      clusterIssuer: cluster-ca-issuer

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
  port: 5432
  database: business

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  storage:
    storageClassName: local-path
    size: 1Gi

resourceQuota:
  enabled: true
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "20"
    persistentvolumeclaims: "5"

limitRange:
  enabled: true
  defaults:
    cpu: 250m
    memory: 256Mi
  defaultRequests:
    cpu: 100m
    memory: 128Mi

networkPolicies:
  enabled: true

rbac:
  # Provisions Role + RoleBinding for `dev-readonly` group and `business-ops` SA.
  # See docs/access.md for the per-user CSR flow that issues a kubeconfig
  # bound to the dev-readonly group.
  enabled: true

backup:
  enabled: true
  # Daily Postgres logical backup. Retains last 7 dumps on the same PVC.
  schedule: "0 3 * * *"
  retention: 7
  image:
    repository: postgres
    tag: "16-alpine"
  storage:
    storageClassName: local-path
    size: 2Gi
