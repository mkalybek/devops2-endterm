name: security-scan

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "charts/**"
      - "extras/kyverno-policies/**"
      - ".github/workflows/security-scan.yml"
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-image:
    name: Trivy — FastAPI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          tags: business-fastapi:ci

      # Two-pass scan: a hard gate that fails on CRITICAL only (broad real-world
      # policy — any CRITICAL with a fix MUST be patched), plus a wider HIGH+CRITICAL
      # pass that uploads to GitHub Security but never fails the build.
      - name: Trivy image scan — fail on CRITICAL (table output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: business-fastapi:ci
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy image scan — audit HIGH+CRITICAL (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: business-fastapi:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  trivy-config:
    name: Trivy — IaC + manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # don't fail PRs on existing tech debt, just surface

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  kyverno-test:
    name: Kyverno — policies parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML well-formedness + required fields
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python - <<'PY'
          import sys, glob, yaml
          fails = 0
          for path in sorted(glob.glob("extras/kyverno-policies/*.yaml")):
              with open(path) as f:
                  try:
                      docs = list(yaml.safe_load_all(f))
                  except yaml.YAMLError as e:
                      print(f"FAIL {path}: invalid YAML — {e}")
                      fails += 1
                      continue
              for d in docs:
                  if not d:
                      continue
                  if d.get("apiVersion") != "kyverno.io/v1" or d.get("kind") != "ClusterPolicy":
                      print(f"FAIL {path}: not a kyverno.io/v1 ClusterPolicy")
                      fails += 1
                      continue
                  if not d.get("spec", {}).get("rules"):
                      print(f"FAIL {path}: spec.rules missing/empty")
                      fails += 1
                      continue
                  print(f"OK   {path} — {len(d['spec']['rules'])} rule(s)")
          sys.exit(1 if fails else 0)
          PY

  helm-lint:
    name: Helm — chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - run: helm lint charts/business
      - run: helm template business charts/business | kubectl --dry-run=client apply -f - || true
        env:
          KUBECONFIG: /dev/null
