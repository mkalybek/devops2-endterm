apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow :latest tag
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["business", "monitoring", "logging"]
      validate:
        message: "An image tag is required (`:latest` and untagged images are forbidden)."
        pattern:
          spec:
            containers:
              - image: "!*:latest & *:*"
