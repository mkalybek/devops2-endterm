apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Allowed image registries
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit  # start as Audit, flip to Enforce once images normalized
  background: true
  rules:
    - name: allowed-registries
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["business"]
      validate:
        message: "Images must come from an approved registry (docker.io, quay.io, ghcr.io, gcr.io, registry.k8s.io, business-fastapi local)."
        pattern:
          spec:
            containers:
              - image: "docker.io/* | quay.io/* | ghcr.io/* | gcr.io/* | registry.k8s.io/* | business-fastapi:*"
