apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  fastapi-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "title": "Request rate (RPS)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum by (handler) (rate(http_requests_total{namespace=\"business\"}[1m]))",
              "legendFormat": "{{handler}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "title": "Error rate (5xx %)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_requests_total{namespace=\"business\",status=~\"5..\"}[1m])) / sum(rate(http_requests_total{namespace=\"business\"}[1m]))",
              "legendFormat": "5xx ratio",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "title": "p95 latency",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.95, sum by (le, handler) (rate(http_request_duration_seconds_bucket{namespace=\"business\"}[5m])))",
              "legendFormat": "{{handler}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "title": "Pods Ready",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(kube_deployment_status_replicas_ready{namespace=\"business\",deployment=\"fastapi\"})",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["business", "fastapi"],
      "time": {"from": "now-15m", "to": "now"},
      "title": "Business — FastAPI",
      "uid": "business-fastapi",
      "version": 1
    }
