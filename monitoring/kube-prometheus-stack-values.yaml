# Reference copy of kube-prometheus-stack values used by ArgoCD app
# argocd/apps/03-monitoring.yaml. ArgoCD inlines its own copy in the helm.values
# field; this file mirrors it 1:1 for human-readable diffing and overrides.
#
# To change the stack, edit BOTH this file and argocd/apps/03-monitoring.yaml.
crds:
  enabled: true

defaultRules:
  create: true

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

grafana:
  # adminPassword is intentionally absent — it is supplied via the
  # SealedSecret `grafana-admin` (charts/business/templates/... — N/A for
  # monitoring ns; sealed at bootstrap into `monitoring/grafana-admin`).
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts: [grafana.local]
    path: /
    annotations:
      cert-manager.io/cluster-issuer: cluster-ca-issuer
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    tls:
      - hosts: [grafana.local]
        secretName: grafana-tls
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.logging:3100
      jsonData:
        maxLines: 1000

kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true

kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
