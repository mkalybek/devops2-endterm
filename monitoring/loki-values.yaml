# Reference copy mirrors argocd/apps/04-loki.yaml inline values.
loki:
  enabled: true
  isDefault: false
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
promtail:
  enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
grafana:
  enabled: false
prometheus:
  enabled: false
