; Single-node Kubespray inventory.
; node1 is BOTH control-plane and worker (etcd lives there too).

[all]
node1 ansible_host=192.168.10.12 ansible_user=root ip=192.168.10.12 ansible_python_interpreter=/usr/bin/python3

[kube_control_plane]
node1

[etcd]
node1

[kube_node]
node1

[k8s_cluster:children]
kube_control_plane
kube_node
