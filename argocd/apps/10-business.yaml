apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: business
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mkalybek/devops2-endterm.git
    targetRevision: main
    path: charts/business
    helm:
      releaseName: business
      # values.yaml inside the chart already has sane defaults — override per-env here if needed
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: business
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
