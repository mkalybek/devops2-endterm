apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # Single-node, no external LB — expose via NodePort on a stable port
          service:
            type: NodePort
            nodePorts:
              http: 30080
              https: 30443
          # The controller pod must be able to schedule on the only node we have
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          ingressClassResource:
            default: true
          # Expose Prometheus metrics for kube-prometheus-stack to scrape
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              additionalLabels:
                release: monitoring
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Default labels & namespace metadata so NetworkPolicies can target it
          podLabels:
            app.kubernetes.io/component: ingress-controller
        defaultBackend:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
